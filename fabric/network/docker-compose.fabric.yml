version: '3.8'

networks:
  dawaTrace:
    name: dawaTrace_network

services:
  orderer.orderer.dawaTrace.com:
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/orderer.dawaTrace.com/orderers/orderer.orderer.dawaTrace.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.dawaTrace.com/orderers/orderer.orderer.dawaTrace.com/tls/:/var/hyperledger/orderer/tls
    ports:
      - "7050:7050"
    networks:
      - dawaTrace

  peer0.org-mfg.dawaTrace.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dawaTrace_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org-mfg.dawaTrace.com
      - CORE_PEER_ADDRESS=peer0.org-mfg.dawaTrace.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org-mfg.dawaTrace.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org-mfg.dawaTrace.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org-mfg.dawaTrace.com:7051
      - CORE_PEER_LOCALMSPID=OrgMfgMSP
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org-mfg.dawaTrace.com/peers/peer0.org-mfg.dawaTrace.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org-mfg.dawaTrace.com/peers/peer0.org-mfg.dawaTrace.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "7051:7051"
    networks:
      - dawaTrace

  peer0.org-distributor.dawaTrace.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dawaTrace_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer0.org-distributor.dawaTrace.com
      - CORE_PEER_ADDRESS=peer0.org-distributor.dawaTrace.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org-distributor.dawaTrace.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org-distributor.dawaTrace.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org-distributor.dawaTrace.com:8051
      - CORE_PEER_LOCALMSPID=OrgDistributorMSP
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org-distributor.dawaTrace.com/peers/peer0.org-distributor.dawaTrace.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org-distributor.dawaTrace.com/peers/peer0.org-distributor.dawaTrace.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "8051:8051"
    networks:
      - dawaTrace

  peer0.org-chemist.dawaTrace.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dawaTrace_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer0.org-chemist.dawaTrace.com
      - CORE_PEER_ADDRESS=peer0.org-chemist.dawaTrace.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org-chemist.dawaTrace.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org-chemist.dawaTrace.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org-chemist.dawaTrace.com:9051
      - CORE_PEER_LOCALMSPID=OrgChemistMSP
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org-chemist.dawaTrace.com/peers/peer0.org-chemist.dawaTrace.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org-chemist.dawaTrace.com/peers/peer0.org-chemist.dawaTrace.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "9051:9051"
    networks:
      - dawaTrace

  peer0.org-regulator.dawaTrace.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=dawaTrace_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_ID=peer0.org-regulator.dawaTrace.com
      - CORE_PEER_ADDRESS=peer0.org-regulator.dawaTrace.com:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org-regulator.dawaTrace.com:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org-regulator.dawaTrace.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org-regulator.dawaTrace.com:10051
      - CORE_PEER_LOCALMSPID=OrgRegulatorMSP
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/org-regulator.dawaTrace.com/peers/peer0.org-regulator.dawaTrace.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/org-regulator.dawaTrace.com/peers/peer0.org-regulator.dawaTrace.com/tls:/etc/hyperledger/fabric/tls
    ports:
      - "10051:10051"
    networks:
      - dawaTrace

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - dawaTrace
