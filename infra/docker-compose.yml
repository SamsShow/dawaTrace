version: '3.8'

networks:
  dawaTrace:
    name: dawaTrace_network

services:
  # Next.js app
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file: ../.env
    networks:
      - dawaTrace
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - dawaTrace
    restart: unless-stopped
