events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
    keepalive 32;
  }

  # Rate limiting zone: 100 req/min per IP for API
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

  server {
    listen 80;
    server_name _;

    # Health check bypass (no rate limit)
    location /health {
      proxy_pass http://api;
      proxy_http_version 1.1;
    }

    # Public batch verification endpoint (higher limit)
    location /verify/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API + GraphQL
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # GraphQL with WebSocket upgrade for subscriptions
    location /graphql {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 86400s;  # Keep WS alive for subscriptions
    }

    # Web dashboard static files
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
